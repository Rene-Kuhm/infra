keys:
  # Real age key for TecnoSquire infrastructure
  # Generated 2026-06-18 on tecnodespegue server
  # Private key: /root/.ssh/sops/age.key (NEVER commit this)
  - &admin_key age1kle58fvctzwfm5ww2a2f76fvhla29nlqsv3qtqvp78c8t3ccsu0qnv3qay
  - &tecsnosquire_key age1kle58fvctzwfm5ww2a2f76fvhla29nlqsv3qtqvp78c8t3ccsu0qnv3qay

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env)$
    key_groups:
      - age:
          - *admin_key
          - *tecsnosquire_key

  # SSH keys for servers
  - path_regex: secrets/ssh/[^/]+$
    key_groups:
      - age:
          - *admin_key

  # Service-specific secrets
  - path_regex: secrets/(gitea|attic|adguard|vaultwarden|nextcloud|grafana)/.*$
    key_groups:
      - age:
          - *admin_key