keys:
  # Replace this with your actual age public key
  # Generate with: age-keygen -o keys/insyd.key
  - &admin_key age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  - &tecsnosquire_key age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env)$
    key_groups:
      - age:
          - *admin_key
          - *tecsnosquire_key

  # SSH keys for servers
  - path_regex: secrets/ssh/[^/]+$
    key_groups:
      - age:
          - *admin_key

  # Service-specific secrets
  - path_regex: secrets/(gitea|attic|adguard|vaultwarden|nextcloud|grafana)/.*$
    key_groups:
      - age:
          - *admin_key