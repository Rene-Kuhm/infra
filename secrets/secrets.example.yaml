# Example secrets template
# Real secrets are encrypted and stored in secrets.yaml
# This file is documentation only - DO NOT commit real secrets here

# Admin token for Attic (generated on first run)
attic:
  admin_token: "<CHANGE_ME>"

# Gitea admin token (created via gitea CLI)
gitea:
  admin_token: "<CHANGE_ME>"
  db_password: "<CHANGE_ME>"

# AdGuard admin password
adguard:
  admin_password: "<CHANGE_ME>"

# Vaultwarden (Fase 1)
vaultwarden:
  admin_token: "<CHANGE_ME>"
  smtp_password: "<CHANGE_ME>"

# Grafana (monitoring)
grafana:
  admin_password: "<CHANGE_ME>"

# Tailscale auth key
tailscale:
  auth_key: "<CHANGE_ME>"

# Backups - restic repository password
restic:
  repository_password: "<CHANGE_ME>"