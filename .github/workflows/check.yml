name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run flake check
        run: nix flake check --show-trace --all-systems

      - name: Build nixosConfigurations
        run: nix build .#nixosConfigurations.tecsnosquire.config.system.build.toplevel --show-trace