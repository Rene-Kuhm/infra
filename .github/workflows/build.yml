name: build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build NixOS toplevel
        run: nix build .#nixosConfigurations.tecsnosquire.config.system.build.toplevel --show-trace

      - name: Build packages
        run: nix build .#packages.x86_64-linux.hello --show-trace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nixos-build
          path: result
          if-no-files-found: error